  programs.tmux = {
    enable = true;
    clock24 = true;
    terminal = "screen-256color";
    historyLimit = 50000;
    keyMode = "vi";
    escapeTime = 0;
    baseIndex = 1;
    extraConfig = ''
      # Enable mouse support
      set -g mouse on

      # Better split bindings
      bind | split-window -h -c "#{pane_current_path}"
      bind - split-window -v -c "#{pane_current_path}"
      unbind '"'
      unbind %

      # New windows keep current path
      bind c new-window -c "#{pane_current_path}"

      # Vim-style pane navigation
      bind h select-pane -L
      bind j select-pane -D
      bind k select-pane -U
      bind l select-pane -R

      # Resize panes with vim keys
      bind -r H resize-pane -L 5
      bind -r J resize-pane -D 5
      bind -r K resize-pane -U 5
      bind -r L resize-pane -R 5

      # Status bar styling
      set -g status-style "bg=colour235,fg=colour136"
      set -g status-left "#[fg=colour232,bg=colour154,bold] #S #[fg=colour154,bg=colour235] "
      set -g status-right "#[fg=colour245] %H:%M #[fg=colour154]| #[fg=colour245]%d-%b-%y "
      set -g status-left-length 30
      set -g window-status-current-style "fg=colour166,bold"
      set -g window-status-format " #I:#W "
      set -g window-status-current-format " #I:#W "

      # Pane borders
      set -g pane-border-style "fg=colour238"
      set -g pane-active-border-style "fg=colour154"

      # Reload config
      bind r source-file /etc/tmux.conf \; display "Config reloaded"
    '';
  };
